<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IaC Deployment | Terraform x Nginx</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --tf-purple: #8449FB; --tf-blue: #00ACFF; --dark: #09090b; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: var(--dark); font-family: 'Space Grotesk', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        .content { 
            position: relative; z-index: 10; height: 100%; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            pointer-events: none; color: white; text-align: center;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(132, 73, 251, 0.3);
            padding: 3rem; border-radius: 24px;
            box-shadow: 0 0 50px rgba(132, 73, 251, 0.1);
        }
        .status-badge {
            background: rgba(0, 172, 255, 0.1);
            color: var(--tf-blue);
            padding: 5px 15px; border-radius: 50px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
            border: 1px solid var(--tf-blue); margin-bottom: 20px; display: inline-block;
        }
        h1 { font-size: 4rem; margin: 0; background: linear-gradient(90deg, #fff, var(--tf-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .code-box { font-family: 'JetBrains Mono', monospace; color: #666; font-size: 0.9rem; margin-top: 20px; }
        .highlight { color: var(--tf-purple); font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="content">
        <div class="main-card">
            <div class="status-badge">terraform_apply_complete --success</div>
            <h1>INFRASTRUCTURE AS CODE</h1>
            <p style="opacity: 0.8; font-size: 1.2rem;">Virtual Machine Provisioned & Nginx Configured via SSH</p>
            <div class="code-box">
                resource <span class="highlight">"azurerm_linux_virtual_machine"</span> "web_server" { ... }
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.baseX = x; this.baseY = y;
                this.size = 2;
                this.density = (Math.random() * 30) + 1;
            }
            draw() {
                ctx.fillStyle = 'rgba(132, 73, 251, 0.8)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius) {
                    this.x += dx / 10; this.y += dy / 10;
                } else {
                    if (this.x !== this.baseX) { let dx = this.x - this.baseX; this.x -= dx / 20; }
                    if (this.y !== this.baseY) { let dy = this.y - this.baseY; this.y -= dy / 20; }
                }
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 150; i++) {
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                particles.push(new Particle(x, y));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].draw(); particles[i].update();
            }
            requestAnimationFrame(animate);
        }

        init(); animate();
    </script>
</body>
</html>
